# Tri-conditional editing — SD3 + ControlNet-Depth (depth carries structure).
# structure = source depth (every step) + Blended Noise Init; appearance = K/V injection
# (mask-localized); background = target text prompt.
backend: sd3_depth
height: 1024
width: 1024
seed: 0
device: cuda
dtype: bfloat16
mask_feather: 2.0

injection:
  layers: [5, 6, 7, 8]          # vital layers for clean appearance transfer (scan result)
  window: [0.0, 1.0]            # inject across the trajectory
  drift_strong: 100.0           # drift gate effectively off (it suppressed appearance)
  drift_medium: 100.0
  strength: 1.8                 # appearance K/V strength (sweet spot; >2.5 artifacts)
  appearance_alpha: 0.3         # Redux-analog tone blend (CLIP image embed -> pooled)
  mode: concat                  # Attention Context Expansion

anchor:
  num_steps: 50
  replay_k: 0.9                 # higher => more editability; lower => stronger structure
  inversion: midpoint           # RK2; euler reconstructs poorly (~16 dB)
  cache_kv: true
